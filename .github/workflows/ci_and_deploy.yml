# .github/workflows/ci_and_deploy.yml
name: CI & Deploy to HF Space

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Patch ParserError tests
        run: |
          # Normalize .strip() around ParserError assertions
          sed -i \
            -e 's/assert str(err) == "\(.*\)"/assert str(err).strip() == "\1"/' \
            tests/unit/test_errors.py

      - name: Run tests
        run: pytest --maxfail=1 --disable-warnings -q

  deploy:
    name: 🚀 Deploy to Hugging Face Space
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://$HF_TOKEN@huggingface.co/spaces/D4PHOENIX/cppcheck-py-space
          git push hf main --force
