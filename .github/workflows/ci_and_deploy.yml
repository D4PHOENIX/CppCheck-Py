name: CI & Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest coverage

      - name: Run tests with coverage
        id: run_tests
        run: |
          passed=$(coverage run -m pytest --disable-warnings -q | tee /dev/tty | grep -oP '^\d+\spassed' | grep -oP '^\d+' || echo 0)
          echo "✅ Passed tests: $passed"
          echo "passed=$passed" >> $GITHUB_OUTPUT
          coverage report
          coverage xml
          exit 0

      - name: Fail if not enough tests passed
        run: |
          if [ "${{ steps.run_tests.outputs.passed }}" -lt 9 ]; then
            echo "❌ Not enough tests passed."
            exit 1
          fi
          echo "✅ Sufficient tests passed."

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://$HF_TOKEN@huggingface.co/spaces/D4PHOENIX/cppcheck-py-space
          git push hf main --force || echo "⚠️ Deploy failed, but commit continues."
